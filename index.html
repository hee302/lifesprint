<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>라이프 스프린트 · Life Sprint</title>
<meta name="description" content="애자일 스프린트 방식으로 한 주를 계획·점검·회고하도록 돕는 AI 에이전트" />
<script src="https://js.puter.com/v2/"></script>
<style>
  :root{
    --bg:#eef1f8; --panel:#ffffff; --panel2:#f7f9fd;
    --ink:#111726; --ink2:#5b6678; --ink3:#9aa4b6;
    --brand:#3b6ef6; --brand2:#2a55d4; --brandsoft:#eaf0ff;
    --ok:#12b886; --oksoft:#e3f8f0; --warn:#e8893b; --warnsoft:#fdf0e4;
    --line:#e9edf5; --line2:#dfe5f0;
    --r1:20px; --r2:14px; --r3:10px;
    --sh1:0 1px 2px rgba(17,23,38,.04); --sh2:0 10px 30px rgba(17,23,38,.08);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.55;}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#d4dae6;border-radius:99px}

  /* layout */
  .shell{max-width:1180px;margin:0 auto;padding:18px 18px 24px;min-height:100%;display:flex;flex-direction:column;gap:16px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mk{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:22px;
    background:linear-gradient(135deg,#3b6ef6,#6f9bff);color:#fff;box-shadow:var(--sh2)}
  .brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
  .brand .tag{font-size:10px;font-weight:800;letter-spacing:.4px;color:var(--brand);background:var(--brandsoft);
    padding:3px 7px;border-radius:6px}
  .brand p{margin:1px 0 0;font-size:12px;color:var(--ink2)}
  .wk{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:99px;padding:7px 8px 7px 16px;box-shadow:var(--sh1)}
  .wk .wt{font-size:12.5px;font-weight:700;color:var(--ink)}
  .wk .ws{font-size:11px;color:var(--ink2)}
  .wk .ring{width:38px;height:38px}

  .mseg{display:none;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;box-shadow:var(--sh1)}
  .mseg button{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-weight:700;font-size:13.5px;color:var(--ink2)}
  .mseg button.on{background:var(--brand);color:#fff}

  .grid{display:grid;grid-template-columns:1fr;gap:16px;flex:1;min-height:0}
  @media(min-width:900px){ .grid{grid-template-columns:1.32fr 1fr} }

  .pane{background:var(--panel);border:1px solid var(--line);border-radius:var(--r1);box-shadow:var(--sh2);
    display:flex;flex-direction:column;overflow:hidden;min-height:0}

  /* ===== Coach (main) ===== */
  #coachPane{min-height:520px}
  .ph{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
  .ph .ava{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#3b6ef6,#6f9bff);
    display:grid;place-items:center;color:#fff;font-size:17px;flex:none}
  .ph .t{font-weight:800;font-size:15px}
  .ph .s{font-size:11.5px;color:var(--ink2)}
  .ph .live{margin-left:auto;font-size:11px;color:var(--ok);font-weight:700;display:flex;align-items:center;gap:5px}
  .ph .live i{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;box-shadow:0 0 0 3px var(--oksoft)}

  #chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:var(--panel2)}
  .row{display:flex;gap:9px;max-width:88%;align-items:flex-end}
  .row.me{align-self:flex-end;flex-direction:row-reverse}
  .av{width:28px;height:28px;border-radius:9px;flex:none;display:grid;place-items:center;font-size:14px}
  .av.bot{background:var(--brandsoft);color:var(--brand)}
  .bub{padding:11px 14px;border-radius:15px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .bot .bub{background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px;box-shadow:var(--sh1)}
  .me .bub{background:linear-gradient(135deg,#3b6ef6,#3061e8);color:#fff;border-bottom-right-radius:5px}
  .act{align-self:center;max-width:92%;background:var(--oksoft);color:#0c7a55;border:1px solid #c4ecdb;
    border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px}
  .typing{display:flex;gap:4px;padding:4px 2px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--ink3);animation:bnc 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes bnc{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

  .composer{border-top:1px solid var(--line);padding:12px 14px;background:var(--panel)}
  .sugs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
  .sugs::-webkit-scrollbar{display:none}
  .sug{flex:none;white-space:nowrap;border:1px solid var(--line2);background:var(--panel);color:var(--brand);
    border-radius:99px;padding:7px 13px;font-size:12.5px;font-weight:600}
  .sug:hover{background:var(--brandsoft)}
  .inbar{display:flex;gap:9px;align-items:flex-end}
  .inbar textarea{flex:1;border:1px solid var(--line2);border-radius:13px;padding:11px 13px;font-size:14px;
    resize:none;max-height:120px;background:var(--panel2);color:var(--ink);font-family:inherit;line-height:1.5}
  .inbar textarea:focus{outline:none;border-color:var(--brand);background:#fff}
  .send{flex:none;height:44px;min-width:44px;padding:0 16px;border:none;border-radius:13px;background:var(--brand);
    color:#fff;font-weight:800;font-size:14px;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
  .send:hover{background:var(--brand2)}
  .send:disabled{opacity:.5;cursor:default}
  .send svg{width:17px;height:17px}

  /* ===== Dashboard ===== */
  #dashPane .dh{padding:14px 16px 0}
  .seg{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px}
  .seg button{flex:1;border:none;background:none;padding:9px 6px;border-radius:9px;font-size:13px;font-weight:700;color:var(--ink2)}
  .seg button.on{background:var(--panel);color:var(--brand);box-shadow:var(--sh1)}
  .dbody{flex:1;overflow-y:auto;padding:16px}
  .view{display:none}.view.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  .summary{display:flex;align-items:center;gap:16px;background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--r2);padding:14px 16px;margin-bottom:14px}
  .ring-wrap{position:relative;width:78px;height:78px;flex:none}
  .ring-wrap .pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:17px;color:var(--brand)}
  .kpis{display:flex;gap:18px}
  .kpi b{display:block;font-size:21px;font-weight:800;line-height:1.1}
  .kpi span{font-size:11.5px;color:var(--ink2)}
  .kpi.warn b{color:var(--warn)}

  .secttl{font-size:12px;font-weight:800;color:var(--ink3);letter-spacing:.3px;text-transform:uppercase;margin:0 2px 9px}
  .task{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--r2);padding:11px 12px;margin-bottom:9px;transition:.2s}
  .task.flash{box-shadow:0 0 0 2px var(--ok);border-color:var(--ok)}
  .chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line2);background:#fff;flex:none;display:grid;place-items:center;color:#fff;font-size:13px}
  .task.done .chk{background:var(--ok);border-color:var(--ok)}
  .task.done .tt{text-decoration:line-through;color:var(--ink3)}
  .tinfo{flex:1;min-width:0}
  .tt{font-weight:700;font-size:14px}
  .td{font-size:11.5px;color:var(--ink2);margin-top:1px}
  .pts{flex:none;font-size:11px;font-weight:800;color:var(--brand);background:var(--brandsoft);border-radius:7px;padding:3px 8px}
  .del{border:none;background:none;color:var(--ink3);font-size:17px;flex:none;width:24px;border-radius:6px}
  .del:hover{color:#e5484d;background:#fdecec}
  .empty{text-align:center;color:var(--ink2);font-size:13px;padding:26px 10px}
  .empty .em{font-size:30px;display:block;margin-bottom:8px;opacity:.7}

  .addbox{margin-top:6px;border:1px dashed var(--line2);border-radius:var(--r2);padding:12px;background:var(--panel2)}
  .addbox summary{font-weight:700;font-size:13px;color:var(--brand);cursor:pointer;list-style:none}
  .addbox summary::-webkit-details-marker{display:none}
  .fld{margin-top:10px}
  .fld label{display:block;font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--line2);border-radius:var(--r3);
    padding:9px 11px;font-size:13.5px;background:#fff;color:var(--ink);font-family:inherit}
  .fld textarea{resize:vertical;min-height:54px}
  .frow{display:flex;gap:9px}.frow .fld{flex:1}
  .btn{border:none;border-radius:var(--r3);padding:9px 15px;font-size:13.5px;font-weight:700;background:var(--brand);color:#fff;white-space:nowrap}
  .btn:hover{background:var(--brand2)}
  .btn.soft{background:var(--brandsoft);color:var(--brand)}
  .log{border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:var(--r3);padding:10px 12px;margin-bottom:9px;background:var(--panel2)}
  .log .d{font-size:11px;font-weight:800;color:var(--brand);margin-bottom:4px}
  .log p{margin:0;font-size:13px;white-space:pre-wrap;color:var(--ink)}

  .foot{text-align:center;color:var(--ink3);font-size:11.5px;padding-top:2px}
  .foot a{color:var(--ink2)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:#0f8b62;color:#fff;
    padding:11px 18px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.3s;z-index:50;box-shadow:var(--sh2)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:899px){
    .mseg{display:flex}
    body[data-pane="coach"] #dashPane{display:none}
    body[data-pane="dash"] #coachPane{display:none}
    #coachPane{min-height:60vh}
    .wk .ring{display:none}
  }
</style>
</head>
<body data-pane="coach">
<div class="shell">

  <div class="topbar">
    <div class="brand">
      <div class="mk">🚀</div>
      <div>
        <h1>라이프 스프린트 <span class="tag">AI AGENT</span></h1>
        <p>애자일 스프린트로 한 주를 계획·점검·회고하는 성장 코치</p>
      </div>
    </div>
    <div class="wk">
      <div>
        <div class="wt" id="wkTitle">이번 주 스프린트</div>
        <div class="ws" id="wkToday"></div>
      </div>
      <svg class="ring" viewBox="0 0 38 38"><circle cx="19" cy="19" r="15" fill="none" stroke="#e9edf5" stroke-width="5"/>
        <circle id="miniRing" cx="19" cy="19" r="15" fill="none" stroke="#12b886" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="94.2" stroke-dashoffset="94.2" transform="rotate(-90 19 19)"/></svg>
    </div>
  </div>

  <div class="mseg">
    <button class="on" data-pane="coach">🤖 AI 코치</button>
    <button data-pane="dash">📊 대시보드</button>
  </div>

  <div class="grid">
    <!-- ===== COACH (MAIN) ===== -->
    <section class="pane" id="coachPane">
      <div class="ph">
        <div class="ava">🤖</div>
        <div><div class="t">AI 코치</div><div class="s">목표를 말하면 스프린트를 직접 짜서 보드에 채워줍니다</div></div>
        <div class="live"><i></i>에이전트 활성</div>
      </div>
      <div id="chat"></div>
      <div class="composer">
        <div class="sugs">
          <button class="sug" onclick="quick('이번 주에 운동 다시 시작, 영어 회화 공부, 밀린 회사 교육 이수, 방 정리를 하고싶어. 평일 저녁 1~2시간 가능. 스프린트로 짜서 보드에 추가해줘')">✨ 이번 주 계획 세우기</button>
          <button class="sug" onclick="quick('지금 보드 상태를 점검하고, 너무 많으면 줄여줘')">📊 보드 점검·조정</button>
          <button class="sug" onclick="quick('오늘 데일리 스탠드업 도와줘')">☀️ 데일리 스탠드업</button>
          <button class="sug" onclick="quick('이번 주 회고를 KPT로 도와줘')">🔄 주간 회고</button>
        </div>
        <div class="inbar">
          <textarea id="chatIn" rows="1" placeholder="예) 이번 주에 ~를 하고 싶어. 스프린트로 짜줘"></textarea>
          <button class="send" id="sendBtn" onclick="send()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
            보내기
          </button>
        </div>
      </div>
    </section>

    <!-- ===== DASHBOARD ===== -->
    <section class="pane" id="dashPane">
      <div class="dh">
        <div class="seg">
          <button class="on" data-view="board">📋 보드</button>
          <button data-view="standup">☀️ 스탠드업</button>
          <button data-view="retro">🔄 회고</button>
        </div>
      </div>
      <div class="dbody">
        <!-- BOARD -->
        <div class="view on" id="v-board">
          <div class="summary">
            <div class="ring-wrap">
              <svg viewBox="0 0 78 78" width="78" height="78"><circle cx="39" cy="39" r="32" fill="none" stroke="#e9edf5" stroke-width="7"/>
                <circle id="bigRing" cx="39" cy="39" r="32" fill="none" stroke="#3b6ef6" stroke-width="7" stroke-linecap="round"
                  stroke-dasharray="201" stroke-dashoffset="201" transform="rotate(-90 39 39)"/></svg>
              <div class="pct" id="ringPct">0%</div>
            </div>
            <div class="kpis">
              <div class="kpi" id="kCommit"><b id="commitPts">0</b><span>계획 포인트</span></div>
              <div class="kpi"><b id="donePts">0</b><span>완료 (속도)</span></div>
            </div>
          </div>
          <div class="secttl">이번 주 태스크</div>
          <div id="taskList"></div>
          <details class="addbox">
            <summary>+ 태스크 직접 추가</summary>
            <div class="frow">
              <div class="fld" style="flex:2"><label>태스크</label><input id="tTitle" type="text" placeholder="예: 수·금 30분 달리기"></div>
              <div class="fld"><label>포인트</label><select id="tPts">
                <option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="5">5</option></select></div>
            </div>
            <div class="fld"><label>완료 기준(DoD)</label><input id="tDod" type="text" placeholder="예: 각 회 30분 완주"></div>
            <div class="fld"><button class="btn" onclick="addTaskFromForm()">추가하기</button></div>
          </details>
        </div>
        <!-- STANDUP -->
        <div class="view" id="v-standup">
          <div class="secttl">오늘의 스탠드업 · <span id="todayPill"></span></div>
          <div class="fld"><label>① 어제 한 일</label><textarea id="suY" placeholder="어제 완료한 것"></textarea></div>
          <div class="fld"><label>② 오늘 할 일</label><textarea id="suT" placeholder="오늘 집중할 것"></textarea></div>
          <div class="fld"><label>③ 막힌 것(블로커)</label><textarea id="suB" placeholder="없으면 비워두세요"></textarea></div>
          <div class="fld"><button class="btn" onclick="saveStandupFromForm()">기록 저장</button></div>
          <div class="secttl" style="margin-top:18px">기록</div>
          <div id="suList"></div>
        </div>
        <!-- RETRO -->
        <div class="view" id="v-retro">
          <div class="secttl">주간 회고 · KPT</div>
          <div class="fld"><label>Keep · 계속할 것</label><textarea id="rK" placeholder="잘된 것"></textarea></div>
          <div class="fld"><label>Problem · 문제였던 것</label><textarea id="rP" placeholder="아쉬웠던 것"></textarea></div>
          <div class="fld"><label>Try · 다음에 시도할 것</label><textarea id="rT" placeholder="다음 스프린트에 적용할 한 가지"></textarea></div>
          <div class="fld"><button class="btn" onclick="saveRetroFromForm()">회고 저장</button>
            <button class="btn soft" onclick="aiRetro()" style="margin-left:6px">🤖 AI 도움</button></div>
          <div class="secttl" style="margin-top:18px">지난 회고</div>
          <div id="rList"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="foot">라이프 스프린트 · 애자일 기반 개인 성장 AI 에이전트 · 데이터는 이 브라우저에만 저장됩니다 · <a href="https://github.com/hee302/lifesprint" target="_blank">source</a></div>
</div>
<div id="toast"></div>

<script>
/* ---------- week ---------- */
function weekRange(){
  const now=new Date(),day=(now.getDay()+6)%7;
  const mon=new Date(now);mon.setDate(now.getDate()-day);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const f=d=>`${d.getMonth()+1}/${d.getDate()}`,wd=['일','월','화','수','목','금','토'][now.getDay()];
  return {today:`${f(now)}(${wd})`,span:`${f(mon)} ~ ${f(sun)}`};
}
const wr=weekRange();
wkTitle.textContent='이번 주 스프린트';wkToday.textContent=wr.span;todayPill.textContent=wr.today;

/* ---------- store ---------- */
const DB={get:k=>JSON.parse(localStorage.getItem('ls_'+k)||'null'),set:(k,v)=>localStorage.setItem('ls_'+k,JSON.stringify(v))};
let tasks=DB.get('tasks')||[],standups=DB.get('standups')||[],retros=DB.get('retros')||[];

/* ---------- nav ---------- */
document.querySelectorAll('.mseg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.mseg button').forEach(x=>x.classList.toggle('on',x===b));
  document.body.dataset.pane=b.dataset.pane;});
document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>setView(b.dataset.view));
function setView(v){
  document.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('on',x.dataset.view===v));
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('on',x.id==='v-'+v));
}
function setPane(p){document.body.dataset.pane=p;
  document.querySelectorAll('.mseg button').forEach(x=>x.classList.toggle('on',x.dataset.pane===p));}

/* ---------- utils ---------- */
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function toast(m){const t=toastEl;t.textContent='✅ '+m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}
const toastEl=document.getElementById('toast');
function normPts(p){p=parseInt(p);return [1,2,3,5].includes(p)?p:(p>=4?5:(p||3));}

/* ---------- board ---------- */
function addTask(title,pts,dod,flash){if(!title)return;
  tasks.push({id:Date.now()+Math.random(),title:title.trim(),pts:normPts(pts),dod:(dod||'').trim(),done:false,_f:flash});
  DB.set('tasks',tasks);renderBoard();}
function addTaskFromForm(){if(!tTitle.value.trim())return;addTask(tTitle.value,tPts.value,tDod.value);tTitle.value='';tDod.value='';}
function toggleTask(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;DB.set('tasks',tasks);renderBoard();}}
function delTask(id){tasks=tasks.filter(x=>x.id!==id);DB.set('tasks',tasks);renderBoard();}
function completeByTitle(t){const x=tasks.find(k=>!k.done&&k.title.includes(t.trim()));if(x){x.done=true;DB.set('tasks',tasks);renderBoard();return true;}return false;}
function renderBoard(){
  const commit=tasks.reduce((a,b)=>a+b.pts,0),done=tasks.filter(t=>t.done).reduce((a,b)=>a+b.pts,0);
  const rate=commit?Math.round(done/commit*100):0;
  commitPts.textContent=commit;donePts.textContent=done;ringPct.textContent=rate+'%';
  bigRing.style.strokeDashoffset=201*(1-rate/100);
  miniRing.style.strokeDashoffset=94.2*(1-rate/100);
  kCommit.classList.toggle('warn',commit>14);
  taskList.innerHTML=tasks.length?tasks.map(t=>`
    <div class="task ${t.done?'done':''} ${t._f?'flash':''}">
      <button class="chk" onclick="toggleTask(${t.id})">${t.done?'✓':''}</button>
      <div class="tinfo"><div class="tt">${esc(t.title)}</div>${t.dod?`<div class="td">${esc(t.dod)}</div>`:''}</div>
      <span class="pts">${t.pts}p</span>
      <button class="del" onclick="delTask(${t.id})">×</button>
    </div>`).join(''):'<div class="empty"><span class="em">🗂️</span>아직 태스크가 없어요.<br>AI 코치에게 "이번 주 계획 세워줘"라고 해보세요.</div>';
  tasks.forEach(t=>t._f=false);
}

/* ---------- standup / retro ---------- */
function addStandup(y,t,b){standups.unshift({date:wr.today,y:(y||'').trim(),t:(t||'').trim(),b:(b||'').trim()});DB.set('standups',standups);renderStandup();}
function saveStandupFromForm(){if(!suY.value&&!suT.value&&!suB.value)return;addStandup(suY.value,suT.value,suB.value);suY.value=suT.value=suB.value='';toast('스탠드업 저장');}
function renderStandup(){suList.innerHTML=standups.length?standups.map(s=>`<div class="log"><div class="d">${esc(s.date)}</div>
  <p><b>어제</b> ${esc(s.y||'-')}\n<b>오늘</b> ${esc(s.t||'-')}\n<b>블로커</b> ${esc(s.b||'없음')}</p></div>`).join(''):'<div class="empty"><span class="em">☀️</span>기록이 아직 없어요.</div>';}
function addRetro(k,p,t){retros.unshift({week:wr.span,k:(k||'').trim(),p:(p||'').trim(),t:(t||'').trim()});DB.set('retros',retros);renderRetro();}
function saveRetroFromForm(){if(!rK.value&&!rP.value&&!rT.value)return;addRetro(rK.value,rP.value,rT.value);rK.value=rP.value=rT.value='';toast('회고 저장');}
function renderRetro(){rList.innerHTML=retros.length?retros.map(r=>`<div class="log"><div class="d">${esc(r.week)}</div>
  <p><b>Keep</b> ${esc(r.k||'-')}\n<b>Problem</b> ${esc(r.p||'-')}\n<b>Try</b> ${esc(r.t||'-')}</p></div>`).join(''):'<div class="empty"><span class="em">🔄</span>아직 회고가 없어요.</div>';}

/* ---------- agent actions ---------- */
function runActions(list){
  let added=0,doneN=0,su=0,re=0;
  (list||[]).forEach(a=>{
    if(a.type==='addTask'&&a.title){addTask(a.title,a.points,a.dod,true);added++;}
    else if(a.type==='completeTask'&&a.title){if(completeByTitle(a.title))doneN++;}
    else if(a.type==='logStandup'){addStandup(a.yesterday,a.today,a.blocker);su++;}
    else if(a.type==='saveRetro'){addRetro(a.keep,a.problem,a.try);re++;}
  });
  const p=[];if(added)p.push(`태스크 ${added}개 추가`);if(doneN)p.push(`${doneN}개 완료`);if(su)p.push('스탠드업 기록');if(re)p.push('회고 저장');
  if(p.length){const m=p.join(', ')+' 완료';toast(m);addAct(m);
    if(added||doneN){setView('board');if(window.innerWidth<900)setPane('dash');}
    if(su){setView('standup');}if(re){setView('retro');}
  }
  return p.length>0;
}
function stateSummary(){
  const commit=tasks.reduce((a,b)=>a+b.pts,0),done=tasks.filter(t=>t.done).reduce((a,b)=>a+b.pts,0);
  const list=tasks.length?tasks.map(t=>`- ${t.title} (${t.pts}점, ${t.done?'완료':'진행중'}${t.dod?', 기준: '+t.dod:''})`).join('\n'):'(없음)';
  return `[현재 앱 상태]\n오늘: ${wr.today}, 이번 주: ${wr.span}\n계획 포인트 ${commit} / 완료(속도) ${done}\n보드 태스크:\n${list}\n스탠드업 ${standups.length}건, 회고 ${retros.length}건`;
}

/* ---------- AI coach ---------- */
const SYSTEM=`너는 "라이프 스프린트 코치"라는 AI 에이전트다. 애자일/스크럼 방식을 개인 일상에 적용해 사용자가 한 주를 스프린트처럼 계획·점검·회고하도록 돕는 한국어 코치이며, 대화만 하지 않고 앱을 직접 조작한다.
[원칙] 거창한 목표보다 이번 주에 끝낼 작은 단위에 집중. 일을 작게 쪼개고 에너지 포인트(1·2·3·5)로 추정. 매 응답에서 제공되는 [현재 앱 상태]를 참고해 현재 보드 기준으로 말한다. 한 주 총 포인트가 14를 넘으면 경고하고 줄이도록 제안. 비난하지 않는다.
[앱 조작] 실제로 보드/기록을 바꿔야 할 때는 자연어 설명을 먼저 쓰고 메시지 맨 끝에 아래 블록을 덧붙인다(사용자에게 안 보이고 앱이 실행):
\`\`\`actions
{"actions":[{"type":"addTask","title":"수·금 30분 달리기","points":2,"dod":"각 회 30분 완주"}]}
\`\`\`
액션: addTask{title,points,dod} / completeTask{title} / logStandup{yesterday,today,blocker} / saveRetro{keep,problem,try}.
규칙: 사용자가 계획을 "보드에 추가/짜줘"라고 하면 곧바로 addTask 액션들을 포함한다. 단순히 물으면 먼저 제안하고 동의 시 액션. 설명은 간결하게.
[말투] 친근하고 간결하게, 질문은 하나씩, 작은 성취도 칭찬.`;
let history=[];
const chat=document.getElementById('chat');
botSay('안녕하세요! 라이프 스프린트 코치예요 🚀\n저는 대화만 하지 않고 보드를 직접 채워주는 에이전트예요. "이번 주에 ~하고 싶어"라고 말하면 스프린트로 정리해 보드에 올려드릴게요. 아래 추천을 눌러 시작해도 좋아요!');

function rowHTML(cls,inner){return `<div class="row ${cls}">${cls==='bot'?'<div class="av bot">🤖</div>':''}<div class="bub">${inner}</div></div>`;}
function meSay(t){chat.insertAdjacentHTML('beforeend',rowHTML('me',esc(t)));scroll();}
function botSay(t){chat.insertAdjacentHTML('beforeend',rowHTML('bot',esc(t)));scroll();}
function addAct(t){chat.insertAdjacentHTML('beforeend',`<div class="act">⚡ ${esc(t)}</div>`);scroll();}
function scroll(){chat.scrollTop=chat.scrollHeight;}
function quick(t){setPane('coach');chatIn.value=t;send();}
function aiRetro(){setPane('coach');quick('이번 주 회고를 KPT로 도와줘. 내 보드 완료 상황을 보고 질문해줘.');}

/* textarea auto-grow */
const ta=document.getElementById('chatIn');
ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';});
ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();send();}});

function parseActions(text){
  const m=text.match(/```actions\s*([\s\S]*?)```/)||text.match(/```json\s*([\s\S]*?)```/);
  let actions=null,clean=text;
  if(m){try{const o=JSON.parse(m[1].trim());actions=o.actions||o;}catch(e){}clean=text.replace(m[0],'').trim();}
  return {actions,clean};
}
async function send(){
  const text=chatIn.value.trim();if(!text)return;
  chatIn.value='';ta.style.height='auto';meSay(text);history.push({role:'user',content:text});
  sendBtn.disabled=true;
  const tw=document.createElement('div');tw.className='row bot';
  tw.innerHTML='<div class="av bot">🤖</div><div class="bub"><div class="typing"><i></i><i></i><i></i></div></div>';
  chat.appendChild(tw);scroll();
  try{
    const messages=[{role:'system',content:SYSTEM},{role:'system',content:stateSummary()},...history];
    const resp=await puter.ai.chat(messages,{model:'gpt-4o-mini'});
    let out=typeof resp==='string'?resp:(resp?.message?.content??resp?.text??(resp?.toString?.()||''));
    if(Array.isArray(out))out=out.map(x=>x.text||'').join('');
    const {actions,clean}=parseActions(out);
    tw.remove();if(clean)botSay(clean);history.push({role:'assistant',content:out});
    if(actions)runActions(actions);
  }catch(e){tw.remove();botSay('⚠ AI 응답을 불러오지 못했어요. 잠시 후 다시 시도하거나, 처음이라면 Puter 로그인 창을 완료했는지 확인해 주세요.');console.error(e);}
  finally{sendBtn.disabled=false;ta.focus();}
}

renderBoard();renderStandup();renderRetro();
</script>
